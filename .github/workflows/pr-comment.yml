name: Submission Reminder
on:
  pull_request:
    types: [opened]
permissions:
  pull-requests: write
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "Thanks for submitting your component!

          Don't forget to complete your submission on the gallery website:
          https://customcomponents.retool.com/

          Your component won't appear in the gallery until the form is submitted and reviewed.

          If you've already submitted the form, you're all set — we'll review it shortly! 🚀"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
